name: dbt CI

on:
  pull_request:
    paths:
      - "dbt/**"

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-core dbt-snowflake

      - name: Configure dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          dbd_player_insights:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                database: DBD_ANALYTICS
                warehouse: TRANSFORM_WH
                role: TRANSFORMER
                schema: "ci_pr_${{ github.event.pull_request.number }}"
                threads: 4
          EOF

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: dbt compile
        run: cd dbt && dbt compile

      - name: dbt test (compile only — no data in CI)
        run: cd dbt && dbt compile --select test_type:singular

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### dbt CI Results
            - **dbt compile**: ${{ steps.compile.outcome || 'completed' }}
            - **Schema**: \`ci_pr_${{ github.event.pull_request.number }}\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
