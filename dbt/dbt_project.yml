name: dbd_player_insights
version: "1.0.0"
config-version: 2

profile: dbd_player_insights

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# ---------------------------------------------------------------------------
# Materialisation defaults per layer
# ---------------------------------------------------------------------------
models:
  dbd_player_insights:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  dbd_player_insights:
    +schema: staging

snapshots:
  dbd_player_insights:
    +schema: snapshots

vars:
  # Lookback window for incremental models (in days)
  incremental_lookback_days: 3
